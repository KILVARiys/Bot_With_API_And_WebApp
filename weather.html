<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода в WebApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #333);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        
        .weather-card {
            background: var(--tg-theme-secondary-bg-color, white);
            border-radius: 24px;
            padding: 32px 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .city-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--tg-theme-text-color, #333);
        }
        
        .temperature {
            font-size: 64px;
            font-weight: 700;
            margin: 16px 0;
            color: var(--tg-theme-button-color, #3498db);
        }
        
        .weather-desc {
            font-size: 20px;
            margin-bottom: 24px;
            color: var(--tg-theme-hint-color, #666);
            text-transform: capitalize;
        }
        
        .details {
            display: flex;
            justify-content: space-around;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid var(--tg-theme-hint-color, #ddd);
        }
        
        .detail-item {
            text-align: center;
        }
        
        .detail-label {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999);
            margin-bottom: 4px;
        }
        
        .detail-value {
            font-size: 18px;
            font-weight: 600;
            color: var(--tg-theme-text-color, #333);
        }
        
        .weather-icon {
            font-size: 48px;
            margin: 16px 0;
        }
        
        .error {
            color: red;
            text-align: center;
            padding: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="weather-card" id="weatherCard">
        <div class="city-name" id="city">--</div>
        <div class="weather-icon" id="weatherIcon">🌡</div>
        <div class="temperature" id="temperature">--°C</div>
        <div class="weather-desc" id="description">--</div>
        <div class="details">
            <div class="detail-item">
                <div class="detail-label">Ощущается</div>
                <div class="detail-value" id="feelsLike">--°C</div>
            </div>
            <div class="detail-item">
                <div class="detail-label">Ветер</div>
                <div class="detail-value" id="wind">-- м/с</div>
            </div>
        </div>
    </div>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // Функция получения параметров из URL
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                city: params.get('city') || 'Не указан',
                temp: params.get('temp') || '--',
                desc: params.get('desc') || '--',
                feels: params.get('feels') || '--',
                wind: params.get('wind') || '--'
            };
        }
        
        // Функция определения иконки погоды
        function getWeatherIcon(description) {
            const desc = description.toLowerCase();
            if (desc.includes('ясно') || desc.includes('солн')) return '☀️';
            if (desc.includes('облачно')) return '☁️';
            if (desc.includes('дождливо')) return '🌧';
            if (desc.includes('снежно')) return '❄️';
            if (desc.includes('гроза')) return '⛈';
            if (desc.includes('туманно')) return '🌫';
            return '🌡';
        }
        
        // Функция определения цвета температуры
        function getTempColor(temp) {
            const t = parseFloat(temp);
            if (t < -10) return '#3498db'; // синий
            if (t < 0) return '#5dade2';    // голубой
            if (t < 10) return '#f1c40f';   // желтый
            if (t < 20) return '#e67e22';   // оранжевый
            return '#e74c3c';                // красный
        }
        
        // Функция обновления UI
        function updateUI() {
            const params = getUrlParams();
            
            // Проверяем, есть ли данные
            if (!params.city || params.city === 'Не указан') {
                document.body.innerHTML = '<div class="error">❌ Ошибка загрузки данных о погоде</div>';
                tg.showAlert('Не удалось загрузить данные о погоде');
                return;
            }
            
            // Обновляем элементы
            document.getElementById('city').textContent = params.city;
            document.getElementById('temperature').textContent = `${params.temp}°C`;
            document.getElementById('description').textContent = params.desc;
            document.getElementById('feelsLike').textContent = `${params.feels}°C`;
            document.getElementById('wind').textContent = `${params.wind} м/с`;
            
            // Устанавливаем иконку
            document.getElementById('weatherIcon').textContent = getWeatherIcon(params.desc);
            
            // Меняем цвет температуры
            document.getElementById('temperature').style.color = getTempColor(params.temp);
            
            // Меняем фон в зависимости от погоды
            const card = document.getElementById('weatherCard');
            if (params.desc.toLowerCase().includes('ясн')) {
                card.style.background = 'linear-gradient(135deg, #f6d365 0%, #fda085 100%)';
            } else if (params.desc.toLowerCase().includes('дожд')) {
                card.style.background = 'linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%)';
            } else if (params.desc.toLowerCase().includes('снег')) {
                card.style.background = 'linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%)';
            }
        }
        
        // Запускаем обновление при загрузке
        updateUI();
        
        // Настраиваем главную кнопку Telegram
        tg.MainButton.setText('Закрыть');
        tg.MainButton.onClick(() => tg.close());
        tg.MainButton.show();
    </script>
</body>
</html>
